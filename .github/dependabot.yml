version: 2
updates:
  - package-ecosystem: pip
    # The Python package lives in packages/ai-launchpad/.
    directory: "/packages/ai-launchpad"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      # Batch routine dependency bumps into a single PR to reduce noise.
      python-dependencies:
        patterns:
          - "*"
    labels:
      - dependencies

  - package-ecosystem: npm
    # The website (Astro) lives at the repository root.
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      website-dependencies:
        patterns:
          - "*"
    labels:
      - dependencies
      - website

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    labels:
      - dependencies
      - github-actions
