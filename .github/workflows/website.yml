name: Website

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "public/**"
      - "scripts/**"
      - "astro.config.mjs"
      - "tsconfig.json"
      - "package.json"
      - "package-lock.json"
      - "vercel.json"
      - "netlify.toml"
      - ".github/workflows/website.yml"
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "public/**"
      - "scripts/**"
      - "astro.config.mjs"
      - "tsconfig.json"
      - "package.json"
      - "package-lock.json"
      - "vercel.json"
      - "netlify.toml"
      - ".github/workflows/website.yml"
  workflow_dispatch:

concurrency:
  group: website-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-verify:
    name: Build & capture evidence
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Start preview server
        run: |
          npm run preview -- --port 4321 --host > preview.log 2>&1 &
          echo "PREVIEW_PID=$!" >> "$GITHUB_ENV"

      - name: Wait for server
        run: |
          for i in $(seq 1 30); do
            if curl -sf -o /dev/null http://localhost:4321/; then
              echo "Server is up."
              exit 0
            fi
            sleep 1
          done
          echo "Server did not start in time. Logs:"
          cat preview.log
          exit 1

      - name: Capture evidence (status checks + screenshots)
        env:
          PREVIEW_URL: http://localhost:4321
        run: npm run screenshots

      - name: Stop preview server
        if: always()
        run: kill "$PREVIEW_PID" 2>/dev/null || true

      - name: Add evidence summary to job summary
        if: always()
        run: cat evidence/summary.md >> "$GITHUB_STEP_SUMMARY" || true

      - name: Upload evidence artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: website-evidence
          path: evidence/
          if-no-files-found: warn

      - name: Upload build output
        uses: actions/upload-artifact@v4
        with:
          name: website-dist
          path: dist/
          if-no-files-found: error

  # Deploy a preview for every PR, gated on the build/evidence job passing.
  # Skips cleanly (no failure) until the Vercel secrets are configured.
  deploy-preview:
    name: Deploy preview to Vercel
    if: github.event_name == 'pull_request'
    needs: build-and-verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Check for Vercel secrets
        id: guard
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "Vercel secrets not configured — skipping deploy."
            echo "ready=false" >> "$GITHUB_OUTPUT"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build & deploy preview
        if: steps.guard.outputs.ready == 'true'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          npm i -g vercel@latest
          vercel pull --yes --environment=preview --token="$VERCEL_TOKEN"
          vercel build --token="$VERCEL_TOKEN"
          url=$(vercel deploy --prebuilt --token="$VERCEL_TOKEN")
          echo "Preview deployed to $url"
          echo "🔍 **Preview deployed:** $url" >> "$GITHUB_STEP_SUMMARY"

  # Deploy to production on every push to main, gated on the same job.
  deploy-production:
    name: Deploy production to Vercel
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build-and-verify
    runs-on: ubuntu-latest
    environment:
      name: production
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Check for Vercel secrets
        id: guard
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "Vercel secrets not configured — skipping deploy."
            echo "ready=false" >> "$GITHUB_OUTPUT"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build & deploy production
        if: steps.guard.outputs.ready == 'true'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          npm i -g vercel@latest
          vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
          vercel build --prod --token="$VERCEL_TOKEN"
          url=$(vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN")
          echo "Production deployed to $url"
          echo "🚀 **Production deployed:** $url" >> "$GITHUB_STEP_SUMMARY"
